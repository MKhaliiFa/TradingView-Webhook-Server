kind = "api"
previewPath = "/"
title = "Webhook Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "Webhook Server"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/webhook_server && PORT=8080 python main.py"

[services.production]

[services.production.run]
args = ["python", "webhook_server/main.py"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/health"
